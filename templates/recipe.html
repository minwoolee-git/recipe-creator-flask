{% extends "base.html" %}

{% block content %}
<div id="root" class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="page-header">
                <h2 class="alert alert-success text-center">Generated Recipe</h2>

                <div class="recipe-result">
                    <p>{{ recipe | safe }}</p>
                </div>

                <div class="text-center">
                    <a href="/" class="btn btn-primary">Generate another recipe</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
