{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <div class="recipe-card">
                <h2 class="text-center mb-4">Input 3 Ingredients</h2>

                <form action="/generate_recipe" method="post">
                    <input
                        type="text"
                        name="ingredient"
                        placeholder="Ingredient 1"
                        required
                    >

                    <input
                        type="text"
                        name="ingredient"
                        placeholder="Ingredient 2"
                        required
                    >

                    <input
                        type="text"
                        name="ingredient"
                        placeholder="Ingredient 3"
                        required
                    >

                    <label class="subheading" for="cuisine">Choose a cuisine:</label>
                    <select name="cuisine" id="cuisine">
                        {% for cuisine in cuisines %}
                            <option value="{{ cuisine }}">{{ cuisine }}</option>
                        {% endfor %}
                    </select>

                    <label class="subheading" for="restrictions">Dietary Restrictions:</label>
                    <div class="checkbox-container">
                        {% for restriction in dietary_restrictions %}
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        name="restrictions"
                                        value="{{ restriction }}"
                                    >
                                    {{ restriction }}
                                </label>
                            </div>
                        {% endfor %}
                    </div>

                    <label class="subheading" for="language">Choose a language:</label>
                    <select name="language" id="language">
                        {% for language, code in languages.items() %}
                            <option value="{{ language }}" {% if language == "Korean" %}selected{% endif %}>
                                {{ language }}
                            </option>
                        {% endfor %}
                    </select>

                    <input type="submit" value="Generate Recipe">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
